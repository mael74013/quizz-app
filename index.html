<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Application de Gestion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestionnaire de Projet</h1>
        </header>
        <main id="app-content">
            <section id="form-section">
    <h2>Enregistrement</h2>
    <form id="main-form">
        <div class="form-group">
            <label for="name">Nom de l'entrée :</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label for="value">Valeur / Score :</label>
            <input type="number" id="value" required>
        </div>
        <button type="submit">Valider</button>
    </form>
</section>
<section id="display-section">
    <div class="score-zone">
        <h3>Score Actuel</h3>
        <p id="score-display">0</p>
    </div>
    
    <div class="result-zone">
        <h3>Résultats récents</h3>
        <ul id="results-list">
            </ul>
    </div>
</section>
            </main>
    </div>
</body>
</html>
