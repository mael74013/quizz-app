<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master - Le Jeu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Quiz Game</h1>
        </header>

        <main id="app-content">
            <section id="form-section">
                <h2>Configuration</h2>
                <form id="quiz-setup-form">
                    <div class="form-group">
                        <label for="username">Nom :</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label for="level">Niveau :</label>
                        <select id="level" required>
                            <option value="easy">Débutant</option>
                            <option value="medium">Intermédiaire</option>
                            <option value="hard">Avancé</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="theme">Thème :</label>
                        <select id="theme" required>
                            <option value="9">Culture Générale</option>
                            <option value="18">Informatique</option>
                            <option value="22">Géographie</option>
                        </select>
                    </div>
                    <button type="submit">Lancer la session</button>
                </form>
            </section>
        </main>

        <section id="display-section" style="display:none;">
            <div class="score-zone">
                <h4>Score : <span id="score-display">0</span></h4>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
